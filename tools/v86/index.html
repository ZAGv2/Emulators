body{margin:0;font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#222;}
header{background:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);flex-wrap:wrap;}
.site-title{font-weight:700;font-size:20px;color:#1e90ff;text-transform:uppercase;}
nav{display:flex;flex-wrap:wrap;}
nav a{margin-left:20px;text-decoration:none;color:#333;font-weight:600;}
nav a:hover{color:#1e90ff;}
.dropdown{position:relative;}
.dropbtn{margin-left:20px;font-weight:600;background:none;border:none;cursor:pointer;color:#333;font-size:16px;}
.dropdown-content{display:none;position:absolute;background:#fff;min-width:200px;box-shadow:0 4px 8px rgba(0,0,0,0.1);border-radius:6px;margin-top:8px;overflow:hidden;}
.dropdown-content a{display:block;padding:10px 15px;text-decoration:none;color:#333;}
.dropdown-content a:hover{background:#f0f8ff;color:#1e90ff;}
.dropdown:hover .dropdown-content{display:block;}
.container{max-width:1100px;margin:40px auto;padding:0 20px;}
.tool-header{display:flex;gap:40px;flex-wrap:wrap;align-items:flex-start;}
.tool-cover img{width:100%;max-width:320px;border-radius:12px;box-shadow:0 6px 12px rgba(0,0,0,0.1);}
.tool-info{flex:1;min-width:260px;}
.tool-info h1{margin-top:0;color:#1e90ff;font-size:28px;}
.meta p{margin:6px 0;font-size:15px;}
.description{margin-top:15px;line-height:1.6;color:#444;}
.download-btn{display:inline-block;margin-top:25px;padding:12px 22px;background:#1e90ff;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;transition:0.3s;}
.download-btn:hover{background:#187bcd;}
footer{margin-top:60px;padding:25px;text-align:center;background:#fff;border-top:1px solid #ddd;color:#555;font-size:14px;}
@media(max-width:768px){
header{flex-direction:column;align-items:flex-start;}
nav{margin-top:10px;width:100%;justify-content:flex-start;}
nav a,.dropbtn{margin-left:0;margin-right:15px;margin-top:8px;}
.tool-header{flex-direction:column;align-items:center;}
.tool-cover img{max-width:100%;}
.tool-info h1{text-align:center;font-size:22px;}
.meta,.description{text-align:center;}
.download-btn{display:block;width:100%;text-align:center;}
.dropdown-content{position:relative;box-shadow:none;}
}
</style>
</head>
