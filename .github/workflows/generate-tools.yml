name: Generate Emulators

on:
  schedule:
    - cron: "0 * * * *"   # runs at minute 0 of every hour (12:00am, 1:00am, 2:00am, ...)
  workflow_dispatch:       # allows manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run generator
        run: node generateTools.js
        # Temporarily removed token
        # env:
        #   GITHUB_TOKEN: ${{ secrets.MY_GITHUB_API }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update emulators" || echo "No changes"
          git push origin main || echo "Push failed"
