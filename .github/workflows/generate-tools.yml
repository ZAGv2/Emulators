name: Generate Emulators Pages

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:        # allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Tool Generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # pass token to JS script
        run: node generateTools.js

      - name: Commit & Push changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: 'ZAG Bot'
          author_email: 'zagbot@example.com'
          message: 'Auto-update emulator pages'