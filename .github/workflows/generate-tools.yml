name: Generate Tools Pages

# Manual trigger and scheduled trigger every 1 hour
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # every hour

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Run generateTools.js
      - name: Run generateTools.jsf
        run: node generateTools.jsf
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}  # workflow secret

      # 4️⃣ Commit & push changes automatically
      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tools tools.json .lastBatchIndex.json
          git commit -m "Auto-update emulator pages" || echo "No changes to commit"
          git push
