<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emulators - ZAG Archive</title>
<style>
body { margin:0; font-family:'Segoe UI', Tahoma, sans-serif; background:#f0f2f5; color:#222; }
header { background:#fff; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); flex-wrap:wrap; }
.site-title { font-weight:700; font-size:20px; color:#1e90ff; text-transform:uppercase; }
nav { display:flex; flex-wrap:wrap; align-items:center; }
nav a { margin-left:20px; text-decoration:none; color:#333; font-weight:600; }
nav a:hover { color:#1e90ff; }
.dropdown { position:relative; }
.dropbtn { margin-left:20px; font-weight:600; background:none; border:none; cursor:pointer; color:#333; font-size:16px; }
.dropdown-content { display:none; position:absolute; background:#fff; min-width:200px; box-shadow:0 4px 8px rgba(0,0,0,0.1); border-radius:6px; margin-top:8px; overflow:hidden; }
.dropdown-content a { display:block; padding:10px 15px; text-decoration:none; color:#333; }
.dropdown-content a:hover { background:#f0f8ff; color:#1e90ff; }
.dropdown:hover .dropdown-content { display:block; }
.container { max-width:1100px; margin:40px auto; padding:0 15px; }
#searchBar { width:100%; max-width:350px; padding:8px 12px; margin-bottom:20px; border-radius:6px; border:1px solid #ccc; }
.tool-table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 6px 12px rgba(0,0,0,0.08); margin-bottom:50px; }
.tool-table th, .tool-table td { padding:12px 10px; border-bottom:1px solid #ddd; font-size:14px; text-align:left; }
.tool-table th { background:#f7f7f7; color:#1e90ff; }
.tool-table tr:hover { background:#f0f8ff; cursor:pointer; }
footer { background:#fff; padding:25px; text-align:center; border-top:1px solid #ddd; color:#555; font-size:14px; }
@media(max-width:768px){ #searchBar { max-width:100%; } }
</style>
</head>
<body>

<header>
<div class="site-title">ZAG Archive</div>
<nav>
<a href="https://zagv2.github.io/ZAGArchive-/index.html">Home</a>
<div class="dropdown">
  <button class="dropbtn">Sections ▼</button>
  <div class="dropdown-content">
    <a href="https://zagv2.github.io/Homebrew-Games/">Homebrew Games</a>
    <a href="https://zagv2.github.io/romhacks-patches/">ROM Hacks & Patches</a>
    <a href="https://zagv2.github.io/resources-tools/">Resources & Tools</a>
  </div>
</div>
<a href="https://zagv2.github.io/ZAGArchive-/about.html">About</a>
<a href="https://zagv2.github.io/ZAGArchive-/contact.html">Contact</a>
</nav>
</header>

<div class="container">
<input type="text" id="searchBar" placeholder="Search by name or platform">
<table class="tool-table" id="allToolsTable">
<thead>
<tr><th>Icon</th><th>Tool</th><th>Platform</th><th>Developer</th><th>Latest Version</th></tr>
</thead>
<tbody>
<!-- Auto.js or workflow will populate all tools here -->
</tbody>
</table>
</div>

<footer>© 2026 ZAG Archive</footer>

<script>
document.getElementById('searchBar').addEventListener('input',function(){
  let val=this.value.toLowerCase();
  document.querySelectorAll('#allToolsTable tbody tr').forEach(tr=>{
    let name=tr.cells[1].textContent.toLowerCase();
    let platform=tr.cells[2].textContent.toLowerCase();
    tr.style.display=(name.includes(val)||platform.includes(val))?'':'none';
  });
});
</script>

</body>
</html>
