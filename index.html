<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emulators - ZAG Archive</title>
<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#f0f2f5; color:#222; }
/* ===== HEADER ===== */
header { background:#fff; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); flex-wrap:wrap; }
.site-title { font-weight:700; font-size:20px; color:#1e90ff; text-transform:uppercase; }
nav { display:flex; flex-wrap:wrap; align-items:center; }
nav a { margin-left:20px; text-decoration:none; color:#333; font-weight:600; }
nav a:hover { color:#1e90ff; }
.dropdown { position:relative; }
.dropbtn { margin-left:20px; font-weight:600; background:none; border:none; cursor:pointer; color:#333; font-size:16px; }
.dropdown-content { display:none; position:absolute; background:#fff; min-width:200px; box-shadow:0 4px 8px rgba(0,0,0,0.1); border-radius:6px; margin-top:8px; overflow:hidden; }
.dropdown-content a { display:block; padding:10px 15px; text-decoration:none; color:#333; }
.dropdown-content a:hover { background:#f0f8ff; color:#1e90ff; }
.dropdown:hover .dropdown-content { display:block; }
/* ===== MAIN ===== */
.container { max-width:1100px; margin:40px auto; padding:0 15px; }
#searchBar { width:100%; max-width:350px; padding:8px 12px; margin-bottom:20px; border-radius:6px; border:1px solid #ccc; }
.game-table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 6px 12px rgba(0,0,0,0.08); margin-bottom:20px; }
.game-table th, .game-table td { padding:12px 10px; border-bottom:1px solid #ddd; font-size:14px; text-align:left; }
.game-table th { background:#f7f7f7; color:#1e90ff; }
.game-table tr:hover { background:#f0f8ff; cursor:pointer; }
/* Pagination */
.pagination { text-align:center; margin-top:20px; margin-bottom:50px; }
.pagination button { margin:2px; padding:8px 12px; border:none; background:#1e90ff; color:#fff; border-radius:6px; cursor:pointer; font-weight:600; transition:0.3s; }
.pagination button:hover { background:#187bcd; }
.pagination button.active { background:#555; }
/* ===== FOOTER ===== */
footer { background:#fff; padding:25px; text-align:center; border-top:1px solid #ddd; color:#555; font-size:14px; }
/* ===== MOBILE ===== */
@media(max-width:768px){ #searchBar { max-width:100%; } .game-table th, .game-table td { font-size:12px; } }
</style>
</head>
<body>

<header>
<div class="site-title">ZAG Archive</div>
<nav>
<a href="https://zagv2.github.io/ZAGArchive-/">Home</a>
<div class="dropdown">
<button class="dropbtn">Sections ▼</button>
<div class="dropdown-content">
<a href="https://zagv2.github.io/Homebrew-Games/">Homebrew Games</a>
<a href="https://zagv2.github.io/romhacks-patches/">ROM Hacks & Patches</a>
<a href="https://zagv2.github.io/resources-tools/">Resources & Tools</a>
</div>
</div>
<a href="https://zagv2.github.io/ZAGArchive-/about.html">About</a>
<a href="https://zagv2.github.io/ZAGArchive-/contact.html">Contact</a>
</nav>
</header>

<div class="container">
<input type="text" id="searchBar" placeholder="Search by title or platform">

<table class="game-table" id="allGamesTable">
<thead>
<tr>
<th>Icon</th><th>Emulator</th><th>Platform</th><th>Developer</th><th>Version</th>
</tr>
</thead>
<tbody>
<!-- JS will populate rows here from tools.json -->
</tbody>
</table>

<div class="pagination" id="pagination"></div>
</div>

<footer>© 2026 ZAG Archive - Emulators</footer>

<script>
// --- Load tools from JSON ---
let allTools = [];
const tbody = document.querySelector('#allGamesTable tbody');
const pagination = document.getElementById('pagination');
const itemsPerPage = 20;
let currentPage = 1;

// --- Render Table ---
function renderTable(page = 1, tools = allTools) {
  tbody.innerHTML = '';
  const start = (page - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const paginatedTools = tools.slice(start, end);

  paginatedTools.forEach(tool => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <img src="${tool.cover || '../default-cover.jpg'}" 
             alt="${tool.name} cover" 
             style="width:32px;height:32px;border-radius:4px;">
      </td>
      <td><a href="tools/${tool.slug}/index.html" target="_blank">${tool.name}</a></td>
      <td>Multi Platform</td>
      <td>${tool.creator}</td>
      <td><a href="${tool.url}" target="_blank">Official Page</a></td>
    `;
    tbody.appendChild(tr);
  });

  renderPagination(tools.length, page);
}

// --- Render Pagination with << < ... > >> style ---
function renderPagination(totalItems, page) {
  pagination.innerHTML = '';
  const totalPages = Math.ceil(totalItems / itemsPerPage);
  let startPage = Math.max(1, page - 2);
  let endPage = Math.min(totalPages, startPage + 3);

  // << First page
  const first = document.createElement('button');
  first.textContent = '<<';
  first.disabled = page === 1;
  first.addEventListener('click', () => { currentPage = 1; renderTable(currentPage, filteredTools()); });
  pagination.appendChild(first);

  // < Previous
  const prev = document.createElement('button');
  prev.textContent = '<';
  prev.disabled = page === 1;
  prev.addEventListener('click', () => { currentPage = Math.max(1,page-1); renderTable(currentPage, filteredTools()); });
  pagination.appendChild(prev);

  // Numbered pages
  for(let i=startPage; i<=endPage; i++){
    const btn = document.createElement('button');
    btn.textContent = i;
    if(i === page) btn.classList.add('active');
    btn.addEventListener('click',()=>{ currentPage=i; renderTable(currentPage, filteredTools()); });
    pagination.appendChild(btn);
  }

  // > Next
  const next = document.createElement('button');
  next.textContent = '>';
  next.disabled = page === totalPages;
  next.addEventListener('click', () => { currentPage = Math.min(totalPages,page+1); renderTable(currentPage, filteredTools()); });
  pagination.appendChild(next);

  // >> Last
  const last = document.createElement('button');
  last.textContent = '>>';
  last.disabled = page === totalPages;
  last.addEventListener('click', () => { currentPage = totalPages; renderTable(currentPage, filteredTools()); });
  pagination.appendChild(last);
}

// --- Search filter ---
function filteredTools() {
  const val = document.getElementById('searchBar').value.toLowerCase();
  return allTools.filter(tool => 
    tool.name.toLowerCase().includes(val) || 'Multi Platform'.toLowerCase().includes(val)
  );
}

document.getElementById('searchBar').addEventListener('input', () => {
  currentPage = 1;
  renderTable(currentPage, filteredTools());
});

// --- Fetch JSON and initialize ---
fetch('tools.json')
  .then(res => res.json())
  .then(tools => {
    allTools = tools;
    renderTable(currentPage);
  })
  .catch(err => console.error("Failed to load tools.json:", err));
</script>

</body>
</html>
