<script>
// --- Load tools from JSON ---
let allTools = [];
const tbody = document.querySelector('#allGamesTable tbody');
const pagination = document.getElementById('pagination');
const itemsPerPage = 20;
let currentPage = 1;

// Render table rows
function renderTable(page = 1, tools = allTools) {
  tbody.innerHTML = '';
  const start = (page - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const paginatedTools = tools.slice(start, end);

  paginatedTools.forEach(tool => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <img src="${tool.cover || 'https://via.placeholder.com/32'}" 
             alt="${tool.name} icon" 
             style="width:32px;height:32px;border-radius:4px;">
      </td>
      <td><a href="tools/${tool.slug}/index.html" target="_blank">${tool.name}</a></td>
      <td>Multi Platform</td>
      <td>${tool.creator}</td>
      <td><a href="${tool.url}" target="_blank">Official Page</a></td>
    `;
    tbody.appendChild(tr);
  });
  renderPagination(tools.length, page);
}

// Pagination with << < 1 2 3 ... > >>
function renderPagination(totalItems, page) {
  pagination.innerHTML = '';
  const totalPages = Math.ceil(totalItems / itemsPerPage);
  const maxButtons = 4; // show 4 page buttons at a time
  let startPage = Math.max(1, page - 1);
  let endPage = Math.min(totalPages, startPage + maxButtons - 1);

  // << go to first
  if (page > 1) {
    const firstBtn = createPageButton('<<', 1);
    pagination.appendChild(firstBtn);
  }

  // < go back
  if (page > 1) {
    const prevBtn = createPageButton('<', page - 1);
    pagination.appendChild(prevBtn);
  }

  // numbered pages
  for (let i = startPage; i <= endPage; i++) {
    const btn = createPageButton(i, i);
    if (i === page) btn.classList.add('active');
    pagination.appendChild(btn);
  }

  // ... if there are more pages
  if (endPage < totalPages) {
    const dots = document.createElement('span');
    dots.textContent = '...';
    dots.style.margin = '0 5px';
    pagination.appendChild(dots);
  }

  // > go forward
  if (page < totalPages) {
    const nextBtn = createPageButton('>', page + 1);
    pagination.appendChild(nextBtn);
  }

  // >> go to last
  if (page < totalPages) {
    const lastBtn = createPageButton('>>', totalPages);
    pagination.appendChild(lastBtn);
  }
}

// Helper to create page button
function createPageButton(text, targetPage) {
  const btn = document.createElement('button');
  btn.textContent = text;
  btn.addEventListener('click', () => {
    currentPage = targetPage;
    renderTable(currentPage, filteredTools());
  });
  return btn;
}

// Search filter
function filteredTools() {
  const val = document.getElementById('searchBar').value.toLowerCase();
  return allTools.filter(tool => 
    tool.name.toLowerCase().includes(val) || 'Multi Platform'.toLowerCase().includes(val)
  );
}

document.getElementById('searchBar').addEventListener('input', () => {
  currentPage = 1;
  renderTable(currentPage, filteredTools());
});

// Fetch JSON and initialize
fetch('tools.json')
  .then(res => res.json())
  .then(tools => {
    allTools = tools;
    renderTable(currentPage);
  })
  .catch(err => console.error("Failed to load tools.json:", err));
</script>
